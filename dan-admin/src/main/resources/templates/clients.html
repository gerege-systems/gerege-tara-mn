<!DOCTYPE html>
<html lang="mn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДАН — Үйлчилгээний бүртгэл</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<div class="topbar">
    <span class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </span>
    <h1>ДАН — Админ</h1>
    <span class="sub">Үйлчилгээний бүртгэл</span>
</div>

<div class="wrap">
    <div class="page-head">
        <div>
            <h2>Бүртгэлтэй үйлчилгээ</h2>
            <span class="count" th:text="|Нийт ${count} үйлчилгээ|">Нийт 0 үйлчилгээ</span>
        </div>
        <a class="btn" href="/clients/new">
            <svg width="16" height="16" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Шинэ үйлчилгээ
        </a>
    </div>

    <div class="card">
        <div class="empty" th:if="${count == 0}">
            <div class="icon">
                <svg width="40" height="40" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
            </div>
            Одоогоор бүртгэлтэй үйлчилгээ алга. Эхнийхээ бүртгэнэ үү.
        </div>

        <table th:if="${count > 0}">
            <thead>
            <tr>
                <th>Үйлчилгээ</th>
                <th>client_id</th>
                <th>Redirect URI</th>
                <th>Scope</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${clients}">
                <td th:text="${c.client_name} ?: '—'">Нэр</td>
                <td class="mono" th:text="${c.client_id}">id</td>
                <td>
                    <div class="uris">
                        <div th:each="u : ${c.redirect_uris}" th:text="${u}">uri</div>
                    </div>
                </td>
                <td class="mono" th:text="${c.scope}">openid</td>
                <td>
                    <form th:action="@{'/clients/' + ${c.client_id} + '/delete'}" method="post"
                          onsubmit="return confirm('Энэ үйлчилгээг устгах уу?');">
                        <button class="btn danger" type="submit">
                            <svg width="14" height="14" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            Устгах
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<div style="text-align:center;color:#9aa3b2;font-size:11px;margin:28px 0;">ДАН · Үндэсний Дата Төв · <span style="opacity:.8;">Powered by Gerege Systems LLC 2026</span></div>
</body>
</html>
