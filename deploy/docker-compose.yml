# ДАН — Локал хөгжүүлэлтийн орчин (Ory Hydra OIDC цөм)
#
# Эстонийн TARA-Login яг ийм бүтэцтэй: Hydra нь OIDC/OAuth2-г бүрэн хариуцаж,
# нэвтрэлтийн UI-г login/consent provider (бидний dan-login) руу чиглүүлдэг.
#
# Ажиллуулах:   cd deploy && docker compose up -d
# Шалгах:       curl http://localhost:4444/.well-known/openid-configuration
# Зогсоох:      docker compose down            (өгөгдөл устгах: docker compose down -v)

name: dan-dev

services:
  # ── 1. Хадгалалт: Hydra-гийн клиент, зөвшөөрөл, токен энд хадгалагдана ──────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: hydra
    volumes:
      - hydra-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 2. Сесс кэш (TARA Apache Ignite ашигладаг; бид хөнгөн Redis-ээр эхэлнэ) ─
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── 3. DB миграц: схемийг үүсгэх нэг удаагийн ажил (Hydra-гаас өмнө) ────────
  hydra-migrate:
    image: oryd/hydra:v2.2.0
    command: migrate sql -e --yes
    environment:
      DSN: postgres://hydra:secret@postgres:5432/hydra?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── 4. Hydra OIDC сервер: public(4444) + admin(4445) ───────────────────────
  hydra:
    image: oryd/hydra:v2.2.0
    command: serve all --dev --config /etc/config/hydra/hydra.yml
    ports:
      - "4444:4444"   # public  — иргэн/үйлчилгээ хандана (/authorize, /token)
      - "4445:4445"   # admin   — клиент бүртгэх, login/consent зөвшөөрөх
    environment:
      DSN: postgres://hydra:secret@postgres:5432/hydra?sslmode=disable
    volumes:
      - ./hydra:/etc/config/hydra:ro
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4445/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 5. ДАН-login: нэвтрэлтийн webapp (Hydra login/consent provider) ─────
  #    Локал хөгжүүлэлтэд mvn spring-boot:run-ээр ажиллуулж болно; энэ service нь
  #    бүх стекийг контейнерт нэг дор асаах зориулалттай.
  dan-login:
    build: ../dan-login
    ports:
      - "3000:3000"
    environment:
      DAN_HYDRA_ADMIN_URL: http://hydra:4445
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DAN_DEMO_TOKEN_URL: http://hydra:4444   # серверээс токен солих (сүлжээгээр)
    depends_on:
      hydra:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── 6. ДАН-admin: үйлчилгээ (RP) бүртгэлийн портал ──────────────────────
  #    ⚠️ Hydra-гийн admin порт руу ханддаг — production-д дотоод сүлжээнд тусгаар.
  dan-admin:
    build: ../dan-admin
    ports:
      - "4000:4000"
    environment:
      DAN_HYDRA_ADMIN_URL: http://hydra:4445
    depends_on:
      hydra:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hydra-postgres:
