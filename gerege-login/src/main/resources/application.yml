server:
  port: 3000

spring:
  application:
    name: gerege-login
  thymeleaf:
    cache: false   # хөгжүүлэлтэд template-ийг шууд дахин ачаална
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# Гэрэгэ-н тохиргоо
gerege:
  hydra:
    # Hydra-гийн ADMIN порт. Локал: localhost:4445; контейнерт: http://hydra:4445
    admin-url: ${GEREGE_HYDRA_ADMIN_URL:http://localhost:4445}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    mn.gov.gerege: DEBUG
