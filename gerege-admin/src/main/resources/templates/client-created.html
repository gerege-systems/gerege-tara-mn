<!DOCTYPE html>
<html lang="mn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гэрэгэ — Үйлчилгээ бүртгэгдлээ</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
<div class="topbar">
    <span class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </span>
    <h1>Гэрэгэ — Админ</h1>
    <span class="sub">Үйлчилгээ бүртгэгдлээ</span>
</div>

<div class="wrap">
    <div class="banner ok">
        <svg class="icon-inline" width="16" height="16" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Үйлчилгээ амжилттай бүртгэгдлээ.
    </div>

    <div class="form-card">
        <label>client_id</label>
        <div class="mono" th:text="${client.client_id}">id</div>

        <div class="secret-box">
            <div class="label">
                <svg width="14" height="14" viewBox="0 0 24 24"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                client_secret <span class="hint" style="color:#9fb2d8;">(зөвхөн ОДОО харагдана — хадгална уу)</span>
            </div>
            <div class="value" th:text="${client.client_secret}">secret</div>
        </div>
        <div class="warn-note">
            Энэ нууц түлхүүрийг дахин харах боломжгүй. Аюулгүй газар хадгална уу.
        </div>

        <div class="actions">
            <a class="btn" href="/">
                <svg width="16" height="16" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Жагсаалт руу буцах
            </a>
        </div>
    </div>
</div>
</body>
</html>
