<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{demo.title}">ДАН — Демо нэвтрэлт амжилттай</title>
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/scripts/main.js"></script>
</head>
<body>
<div class="card" style="max-width:480px;">
    <div class="brand">
        <div class="logo" style="color:#1d6b3f;"><svg th:replace="~{fragments/icons :: user-check}"></svg></div>
        <h1 th:text="#{demo.heading}">Нэвтрэлт амжилттай</h1>
        <div class="sub" th:text="#{demo.sub}">Демо үйлчилгээнд таныг таниглаа</div>
    </div>

    <p class="muted" style="text-align:left;" th:text="#{demo.intro}">
        Жинхэнэ үйлчилгээ дараах мэдээллийг (id_token) ДАН-гээс авна:
    </p>

    <div class="claims">
        <div class="claim"><span class="k" th:text="#{demo.label.sub}">Регистр (sub)</span><span class="v mono" th:text="${claims.sub}">—</span></div>
        <div class="claim"><span class="k" th:text="#{demo.label.name}">Нэр</span><span class="v" th:text="${claims.name}">—</span></div>
        <div class="claim"><span class="k" th:text="#{demo.label.loa}">Итгэмжлэл (loa)</span><span class="v" th:text="${claims.loa}">—</span></div>
        <div class="claim"><span class="k" th:text="#{demo.label.method}">Арга</span><span class="v" th:text="${claims.auth_method}">—</span></div>
    </div>

    <a class="primary-btn" href="/" th:text="#{demo.back}">Нүүр хуудас руу буцах</a>

    <div class="footer">
        <span th:text="#{footer.tara}">Эстони → Монгол · нээлттэй эхийн TARA системд суурилав</span><br><span style="opacity:.7;">Powered by Gerege Systems LLC 2026</span>
    </div>
</div>
</body>
</html>
