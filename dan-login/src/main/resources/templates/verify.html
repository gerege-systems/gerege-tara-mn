<!DOCTYPE html>
<html lang="mn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДАН — Баталгаажуулж байна</title>
    <link rel="stylesheet" href="/styles/main.css">
    <script src="/scripts/main.js" defer></script>
</head>
<body>
<div class="card" th:attr="data-session-id=${sessionId}">
    <div class="brand">
        <div class="logo"><svg th:replace="~{fragments/icons :: __${methodIconName}__}"></svg></div>
        <h1 th:text="${methodLabel}">Нэвтрэлт</h1>
        <div class="sub">Баталгаажуулж байна</div>
    </div>

    <!-- Баталгааны код (зөвхөн ашигладаг аргуудад: Mobile-ID, Smart-ID) -->
    <div class="control-code" th:if="${controlCode != null}">
        <div class="muted">Баталгааны код</div>
        <div class="digits" th:text="${controlCode}">0000</div>
    </div>

    <div class="spinner"></div>
    <p class="muted" id="status">
        Төхөөрөмж дээрээ баталгаажуулна уу…
    </p>

    <div class="footer">
        Эстони &rarr; Монгол · нээлттэй эхийн TARA системд суурилав<br><span style="opacity:.7;">Powered by Gerege Systems LLC 2026</span>
    </div>
</div>
</body>
</html>
