<!DOCTYPE html>
<html lang="mn" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДАН — Нэвтрэх</title>
    <link rel="stylesheet" href="/dan.css">
</head>
<body>
<div class="card">
    <div class="brand">
        <div class="logo"><svg th:replace="~{fragments/icons :: shield}"></svg></div>
        <h1>ДАН</h1>
        <div class="sub">Монголын төрийн нэгдсэн нэвтрэлт</div>
    </div>

    <div class="client-banner">
        <b th:text="${clientName}">Үйлчилгээ</b> танаас нэвтрэхийг хүсэж байна
    </div>

    <form method="post" th:action="@{/auth/login}">
        <input type="hidden" name="login_challenge" th:value="${loginChallenge}"/>

        <div class="methods">
            <label class="method active" th:each="m, it : ${methods}">
                <input type="radio" name="method" th:value="${m.name}" th:checked="${it.index == 0}"/>
                <span class="icon"><svg th:replace="~{fragments/icons :: __${m.iconName}__}"></svg></span>
                <span th:text="${m.label}">Арга</span>
                <span class="badge" th:text="${m.loa}">LOA</span>
            </label>
        </div>

        <label for="personalCode">Регистрийн дугаар (РД)</label>
        <input type="text" id="personalCode" name="personalCode"
               placeholder="УУ00010101" required autofocus/>

        <label for="phoneNumber">Утасны дугаар <span class="muted">(Mobile-ID-д)</span></label>
        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="99112233"/>

        <button type="submit">Нэвтрэх</button>
    </form>

    <div class="footer">
        Эстони &rarr; Монгол · нээлттэй эхийн TARA системд суурилав<br><span style="opacity:.7;">Powered by Gerege Systems LLC 2026</span>
    </div>
</div>
</body>
</html>
